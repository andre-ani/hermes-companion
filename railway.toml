[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/hermes-runtime/Dockerfile"
watchPatterns = ["/apps/bridge/**", "/packages/contracts/**", "/infra/hermes-runtime/**", "/package.json", "/package-lock.json", "/railway.toml"]

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
