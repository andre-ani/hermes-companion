name: Release

on:
  push:
    tags: ['desktop-v*', 'bridge-v*']

permissions:
  contents: write
  packages: write

jobs:
  desktop:
    if: startsWith(github.ref_name, 'desktop-v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: macos
          - os: windows-latest
            artifact: windows
          - os: ubuntu-latest
            artifact: linux
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - name: Electron UAT (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run electron:uat --workspace=@hermes-companion/desktop
      - name: Electron UAT (macOS and Windows)
        if: runner.os != 'Linux'
        run: npm run electron:uat --workspace=@hermes-companion/desktop
      - run: npm run dist --workspace=@hermes-companion/desktop
      - run: npm run release:checksums --workspace=@hermes-companion/desktop
      - run: npm run release:verify --workspace=@hermes-companion/desktop
      - uses: actions/upload-artifact@v4
        with:
          name: hermes-companion-${{ github.ref_name }}-${{ matrix.artifact }}-uat
          path: apps/desktop/uat-artifacts/**
          if-no-files-found: error
          retention-days: 90
      - uses: actions/upload-artifact@v4
        with:
          name: hermes-companion-${{ github.ref_name }}-${{ matrix.artifact }}
          path: apps/desktop/electron-dist/**
          if-no-files-found: error
          retention-days: 90
      - uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/electron-dist/**

  bridge:
    if: startsWith(github.ref_name, 'bridge-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/bridge/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hermes-companion-bridge:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/hermes-companion-bridge:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
